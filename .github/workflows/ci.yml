name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo test --workspace --all-targets

  desktop:
    name: Desktop frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - working-directory: apps/desktop
        run: npm ci
      - working-directory: apps/desktop
        run: npm run build

  release-automation:
    name: Release automation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test scripts/tests/ffmpeg-dependency.test.mjs
      - run: node scripts/ffmpeg-dependency.mjs validate-lock --lock .github/ffmpeg.lock.json
      - run: bash -n scripts/verify-release-sources.sh scripts/build-release-ffmpeg.sh scripts/stage-release-ffmpeg.sh
